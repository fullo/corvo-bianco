<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .bar { background: var(--vermilion); opacity: 0.7; height: 6px; }
  .sp-row { display: grid; grid-template-columns: 90px 1fr 70px; align-items: center; gap: 16px; padding: 4px 0; }
  .sp-name { font-family: 'Courier New', monospace; font-size: 11.5px; color: var(--sumi); }
  .sp-meta { font-family: var(--font-body); font-size: 11px; color: var(--kohaku); font-style: italic; }
</style>
</head>
<body>
<div class="card" style="padding: 22px 32px;">
  <div class="sp-row"><span class="sp-name">space-1</span><div class="bar" style="width: 8px;"></div><span class="sp-meta">8 px</span></div>
  <div class="sp-row"><span class="sp-name">space-2</span><div class="bar" style="width: 16px;"></div><span class="sp-meta">16 px</span></div>
  <div class="sp-row"><span class="sp-name">space-3</span><div class="bar" style="width: 24px;"></div><span class="sp-meta">24 px</span></div>
  <div class="sp-row"><span class="sp-name">space-4</span><div class="bar" style="width: 32px;"></div><span class="sp-meta">32 px</span></div>
  <div class="sp-row"><span class="sp-name">space-5</span><div class="bar" style="width: 48px;"></div><span class="sp-meta">48 px</span></div>
  <div class="sp-row"><span class="sp-name">space-6</span><div class="bar" style="width: 64px;"></div><span class="sp-meta">64 px</span></div>
  <div class="sp-row"><span class="sp-name">space-7</span><div class="bar" style="width: 96px;"></div><span class="sp-meta">96 px · sezione</span></div>
  <div class="sp-row"><span class="sp-name">space-8</span><div class="bar" style="width: 128px;"></div><span class="sp-meta">128 px</span></div>
  <div class="sp-row"><span class="sp-name">space-9</span><div class="bar" style="width: 192px;"></div><span class="sp-meta">192 px · hero</span></div>
</div>
</body>
</html>
