<!doctype html>
<html lang="it" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  html, body { background: var(--washi); color: var(--sumi); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background: var(--washi);"></div>
      <div class="meta"><strong style="color: var(--sumi);">Washi</strong><code style="color: var(--sumi-soft);">#16140f</code><span style="color: var(--kohaku);">Carta notturna</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--rice);"></div>
      <div class="meta"><strong style="color: var(--sumi);">Rice</strong><code style="color: var(--sumi-soft);">#1f1c17</code><span style="color: var(--kohaku);">Tono-su-tono</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--washi-deep);"></div>
      <div class="meta"><strong style="color: var(--sumi);">Washi deep</strong><code style="color: var(--sumi-soft);">#0e0c09</code><span style="color: var(--kohaku);">Profondit&agrave;</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--sumi);"></div>
      <div class="meta"><strong style="color: var(--sumi);">Sumi</strong><code style="color: var(--sumi-soft);">#ede5d3</code><span style="color: var(--kohaku);">Testo primario</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--sumi-soft);"></div>
      <div class="meta"><strong style="color: var(--sumi);">Sumi soft</strong><code style="color: var(--sumi-soft);">#bfb3a0</code><span style="color: var(--kohaku);">Secondario</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--vermilion); border-radius: 2px;"></div>
      <div class="meta"><strong style="color: var(--sumi);">Vermilion</strong><code style="color: var(--sumi-soft);">#c9483d</code><span style="color: var(--kohaku);">Sigillo, invariato</span></div>
    </div>
  </div>
</div>
</body>
</html>
