<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <table style="width: 100%; border-collapse: collapse; font-family: var(--font-body); font-size: 13px;">
    <tbody>
      <tr>
        <td style="padding: 9px 0; width: 30%;"><code style="font-family: 'Courier New', monospace; font-size: 12px; color: var(--sumi);">--fg</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">testo primario</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; background: var(--sumi); border: 1px solid var(--ink-line);"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ --sumi</code></td>
      </tr>
      <tr style="border-top: 1px solid var(--ink-line);">
        <td style="padding: 9px 0;"><code style="font-family: 'Courier New', monospace; font-size: 12px;">--fg-soft</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">testo secondario</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; background: var(--sumi-soft); border: 1px solid var(--ink-line);"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ --sumi-soft</code></td>
      </tr>
      <tr style="border-top: 1px solid var(--ink-line);">
        <td style="padding: 9px 0;"><code style="font-family: 'Courier New', monospace; font-size: 12px;">--fg-muted</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">didascalie, etichette</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; background: var(--kohaku); border: 1px solid var(--ink-line);"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ --kohaku</code></td>
      </tr>
      <tr style="border-top: 1px solid var(--ink-line);">
        <td style="padding: 9px 0;"><code style="font-family: 'Courier New', monospace; font-size: 12px;">--bg</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">sfondo pagina</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; background: var(--washi); border: 1px solid var(--ink-line);"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ --washi</code></td>
      </tr>
      <tr style="border-top: 1px solid var(--ink-line);">
        <td style="padding: 9px 0;"><code style="font-family: 'Courier New', monospace; font-size: 12px;">--bg-alt</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">zone tono-su-tono chiare</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; background: var(--rice); border: 1px solid var(--ink-line);"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ --rice</code></td>
      </tr>
      <tr style="border-top: 1px solid var(--ink-line);">
        <td style="padding: 9px 0;"><code style="font-family: 'Courier New', monospace; font-size: 12px;">--accent</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">sigillo, hover dei link</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; background: var(--vermilion); border-radius: 2px;"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ --vermilion</code></td>
      </tr>
      <tr style="border-top: 1px solid var(--ink-line);">
        <td style="padding: 9px 0;"><code style="font-family: 'Courier New', monospace; font-size: 12px;">--rule</code></td>
        <td style="padding: 9px 0; color: var(--kohaku); font-style: italic;">separatori sottili</td>
        <td style="padding: 9px 0; text-align: right;"><span style="display:inline-block; width: 18px; height: 18px; vertical-align: middle; border-top: 1px solid var(--ink-line); border-bottom: 1px solid var(--ink-line);"></span> <code style="font-size: 11px; color: var(--sumi-soft);">→ 12% ink</code></td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
