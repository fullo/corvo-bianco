<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 24px 32px; display: flex; align-items: center; gap: 28px;">
  <div style="flex: 0 0 220px; height: 150px; display: flex; align-items: center; justify-content: center; background: var(--washi);">
    <span class="cb-logo-mask" role="img" aria-label="Yatagarasu" style="display:block; width: 200px; aspect-ratio: 11/6; --cb-logo-src: url('../assets/yatagarasu.svg');"></span>
  </div>
  <div style="flex: 1; padding-left: 24px; border-left: 1px solid var(--ink-line);">
    <div class="label" style="margin-bottom: 8px;">Marchio · Yatagarasu</div>
    <h3 style="font-family: var(--font-display); font-weight: 400; font-size: 22px; color: var(--sumi); margin: 0 0 10px;">Il corvo a tre zampe</h3>
    <p style="font-family: var(--font-body); font-size: 13px; line-height: 1.55; color: var(--sumi-soft); margin: 0;">
      Sumi-e, bianco, senza occhio nel becco. Corpo che emerge dalla carta, definito dai tratti di contorno. Tre zampe a terra.
    </p>
    <p style="font-family: 'Courier New', monospace; font-size: 11px; color: var(--kohaku); margin: 10px 0 0;">
      assets/yatagarasu.png · .svg
    </p>
  </div>
</div>
</body>
</html>
