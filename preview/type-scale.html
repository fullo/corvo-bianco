<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 22px 32px;">
  <div style="padding: 10px 0; border-bottom: 1px solid var(--ink-line); display: flex; align-items: baseline; gap: 24px;">
    <div class="label" style="width: 140px; flex-shrink:0;">H1 · 3.95rem</div>
    <div style="font-family: var(--font-display); font-weight: 400; font-size: 38px; line-height: 1.15; letter-spacing: -0.01em; color: var(--sumi);">L'animale che vede</div>
  </div>
  <div style="padding: 10px 0; border-bottom: 1px solid var(--ink-line); display: flex; align-items: baseline; gap: 24px;">
    <div class="label" style="width: 140px; flex-shrink:0;">H2 · 2.22rem</div>
    <div style="font-family: var(--font-display); font-weight: 400; font-size: 27px; line-height: 1.2; color: var(--sumi);">Memoria che fa domande</div>
  </div>
  <div style="padding: 10px 0; border-bottom: 1px solid var(--ink-line); display: flex; align-items: baseline; gap: 24px;">
    <div class="label" style="width: 140px; flex-shrink:0;">H3 · 1.67rem</div>
    <div style="font-family: var(--font-display); font-weight: 400; font-size: 21px; line-height: 1.3; color: var(--sumi);">Disciplina dello sguardo</div>
  </div>
  <div style="padding: 10px 0; border-bottom: 1px solid var(--ink-line); display: flex; align-items: baseline; gap: 24px;">
    <div class="label" style="width: 140px; flex-shrink:0;">Body · 1.25rem</div>
    <div style="font-family: var(--font-body); font-size: 16px; line-height: 1.65; color: var(--sumi); max-width: 420px;">Ottimizzano la parte e perdono il tutto. Vincono la partita di oggi e perdono quella che conta.</div>
  </div>
  <div style="padding: 10px 0; display: flex; align-items: baseline; gap: 24px;">
    <div class="label" style="width: 140px; flex-shrink:0;">Caption · 0.84rem</div>
    <div style="font-family: var(--font-body); font-size: 12.5px; font-style: italic; color: var(--kohaku);">Nota a margine, didascalia, riferimento secondario.</div>
  </div>
</div>
</body>
</html>
