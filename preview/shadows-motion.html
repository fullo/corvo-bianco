<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 22px 32px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 36px;">
    <div>
      <div class="label" style="margin-bottom: 10px;">Ombre</div>
      <div style="font-family: var(--font-display); font-style: italic; font-size: 22px; color: var(--sumi); line-height: 1.2;">— assenti —</div>
      <p style="font-family: var(--font-body); font-size: 12px; font-style: italic; color: var(--kohaku); margin: 10px 0 0; line-height: 1.55;">
        Nel sumi-e l'ombra è suggerita dalla diluizione dell'inchiostro, non da un drop-shadow. Il token <code style="font-family: 'Courier New', monospace; font-size: 11px;">--shadow-none</code> è il default.
      </p>
    </div>
    <div>
      <div class="label" style="margin-bottom: 10px;">Transizioni</div>
      <div style="font-family: 'Courier New', monospace; font-size: 11.5px; color: var(--sumi); line-height: 1.8;">
        --t-base &nbsp;&nbsp;<span style="color: var(--kohaku);">200ms ease</span><br>
        --t-slow &nbsp;&nbsp;<span style="color: var(--kohaku);">400ms ease</span>
      </div>
      <p style="font-family: var(--font-body); font-size: 12px; font-style: italic; color: var(--kohaku); margin: 12px 0 0; line-height: 1.55;">
        Solo cambio colore e fade. Mai parallax, scroll-reveal, cursori custom.
      </p>
    </div>
  </div>
</div>
</body>
</html>
