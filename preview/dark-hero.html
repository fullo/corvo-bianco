<!doctype html>
<html lang="it" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  html, body { background: var(--washi); color: var(--sumi); }
</style>
</head>
<body>
<div class="card" style="padding: 36px 32px; display: flex; align-items: center; gap: 32px;">
  <div style="flex: 0 0 180px; height: 140px; display: flex; align-items: center; justify-content: center;">
    <span class="cb-logo-mask" role="img" aria-label="Yatagarasu" style="display:block; width: 160px; aspect-ratio: 11/6; --cb-logo-src: url('../assets/yatagarasu.svg');"></span>
  </div>
  <div style="flex: 1; padding-left: 28px; border-left: 1px solid var(--ink-line);">
    <div style="font-family: var(--font-display); font-style: italic; font-size: 38px; line-height: 1.05; letter-spacing: -0.01em; color: var(--sumi);">Respice&nbsp;finem</div>
    <p style="font-family: var(--font-body); font-size: 13px; color: var(--kohaku); font-style: italic; margin: 10px 0 0;">
      Inchiostro su carta notturna. Sigillo invariato.
    </p>
    <div style="margin-top: 14px; display: flex; align-items: center; gap: 10px;">
      <span style="display:inline-block; width: 18px; height: 18px; background: var(--vermilion); border-radius: 2px; opacity: 0.92;"></span>
      <span style="font-family: var(--font-mono); font-size: 11px; color: var(--sumi-soft);">CSS mask &middot; fill var(--sumi) &middot; sempre in palette</span>
    </div>
  </div>
</div>
</body>
</html>
