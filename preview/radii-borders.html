<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
    <div>
      <div class="label" style="margin-bottom: 12px;">Raggi</div>
      <div style="display: flex; gap: 18px; align-items: flex-end;">
        <div style="text-align: center;">
          <div style="width: 56px; height: 56px; background: var(--sumi); border-radius: 0;"></div>
          <div style="font-family: 'Courier New', monospace; font-size: 10px; color: var(--kohaku); margin-top: 6px;">none · 0</div>
        </div>
        <div style="text-align: center;">
          <div style="width: 56px; height: 56px; background: var(--vermilion); opacity: 0.85; border-radius: 2px;"></div>
          <div style="font-family: 'Courier New', monospace; font-size: 10px; color: var(--kohaku); margin-top: 6px;">xs · 2 px</div>
        </div>
        <div style="text-align: center;">
          <div style="width: 56px; height: 56px; background: var(--sumi-soft); border-radius: 4px;"></div>
          <div style="font-family: 'Courier New', monospace; font-size: 10px; color: var(--kohaku); margin-top: 6px;">sm · 4 px</div>
        </div>
      </div>
      <p style="font-family: var(--font-body); font-size: 11.5px; font-style: italic; color: var(--kohaku); margin: 14px 0 0; line-height: 1.55;">
        Il sumi-e non conosce il rounded corner. Default: 0.
      </p>
    </div>
    <div>
      <div class="label" style="margin-bottom: 12px;">Bordi & tratti</div>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div>
          <div style="height: 16px; border-bottom: 1px solid var(--ink-line);"></div>
          <div style="font-family: 'Courier New', monospace; font-size: 10.5px; color: var(--kohaku); margin-top: 4px;">--ink-line · rgba 12%</div>
        </div>
        <div>
          <div style="height: 16px; border-bottom: 1px solid var(--ink-line-strong);"></div>
          <div style="font-family: 'Courier New', monospace; font-size: 10.5px; color: var(--kohaku); margin-top: 4px;">--ink-line-strong · rgba 32%</div>
        </div>
        <div>
          <div style="height: 16px; border-bottom: 1px solid var(--sumi);"></div>
          <div style="font-family: 'Courier New', monospace; font-size: 10.5px; color: var(--kohaku); margin-top: 4px;">--sumi · solid 1px</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
