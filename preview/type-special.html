<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 24px 32px;">
  <div style="padding: 8px 0 14px;">
    <div class="label" style="margin-bottom: 10px;">Motto inline · italic + tracking 0.04em</div>
    <p style="font-family: var(--font-body); font-size: 16px; line-height: 1.65; color: var(--sumi); margin: 0;">
      Tutto questo si raccoglie in due parole: <span style="font-family: var(--font-display); font-style: italic; font-size: 21px; letter-spacing: 0.04em;">respice finem</span>.
    </p>
  </div>
  <div class="rule"></div>
  <div style="padding: 4px 0 14px;">
    <div class="label" style="margin-bottom: 12px;">Section label · uppercase · tracking 0.18em</div>
    <div style="display: flex; gap: 28px;">
      <span style="font-family: var(--font-display); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--kohaku);">Perché</span>
      <span style="font-family: var(--font-display); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--kohaku);">Cosa</span>
      <span style="font-family: var(--font-display); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--kohaku);">Come</span>
      <span style="font-family: var(--font-display); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--kohaku);">Decalogo</span>
    </div>
  </div>
  <div class="rule"></div>
  <div style="padding: 4px 0;">
    <div class="label" style="margin-bottom: 10px;">Caption · EB Garamond italic 0.84rem</div>
    <p style="font-family: var(--font-body); font-size: 12.5px; font-style: italic; color: var(--kohaku); margin: 0; line-height: 1.55;">
      Da questa postura, scegliamo: il fine lungo più che l'obiettivo a portata di mano.
    </p>
  </div>
</div>
</body>
</html>
